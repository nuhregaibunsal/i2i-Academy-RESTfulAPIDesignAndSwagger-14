spring:
  application:
    name: customer-api
  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${ORACLE_USER:i2i_app}
    password: ${ORACLE_PASSWORD:i2i_pass}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
